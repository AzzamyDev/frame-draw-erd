services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-frame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-frame}
      POSTGRES_DB:       ${POSTGRES_DB:-frame_erd}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frame} -d ${POSTGRES_DB:-frame_erd}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (NestJS) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      PORT:                   4000
      DATABASE_URL:           postgresql://${POSTGRES_USER:-frame}:${POSTGRES_PASSWORD:-frame}@postgres:5432/${POSTGRES_DB:-frame_erd}
      JWT_ACCESS_SECRET:      ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required — copy .env.example to .env}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required — copy .env.example to .env}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      GITHUB_CLIENT_ID:       ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET:   ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL:    ${GITHUB_CALLBACK_URL:-http://localhost/api/auth/github/callback}
      FRONTEND_URL:           ${FRONTEND_URL:-http://localhost}
      ANTHROPIC_API_KEY:      ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    # Expose port to host — useful for debugging; remove in production if not needed
    ports:
      - "4000:4000"

  # ── Frontend (React → nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
